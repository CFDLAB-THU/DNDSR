# Build and deploy documentation to GitHub Pages.
# Manually triggered via workflow_dispatch.
#
# Uses the full CMake configure so that the Doxyfile, version strings,
# and all paths are handled identically to a local build.  External
# dependencies are cached to avoid rebuilding on every run.
#
# Cache layers:
#   1. pip packages        — keyed by requirements.txt hash
#   2. Header-only libs    — keyed by tarball URL (changes ~never)
#   3. cfd_externals build — keyed by build script + .gitmodules hash

name: Deploy Documentation

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build docs from (branch, tag, or SHA)"
        required: false
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  HEADERONLYS_URL: https://github.com/harryzhou2000/cfd_externals_headeronlys/releases/latest/download/external_headeronlys.tar.gz

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ------------------------------------------------------------------
      # 1. Checkout (full history for git describe)
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0
          submodules: recursive

      # ------------------------------------------------------------------
      # 2. System packages
      # ------------------------------------------------------------------
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            doxygen graphviz cmake ninja-build \
            libopenmpi-dev openmpi-bin

      # ------------------------------------------------------------------
      # 3. Python + Sphinx dependencies
      # ------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-docs-${{ hashFiles('docs/sphinx/requirements.txt') }}
          restore-keys: pip-docs-

      - name: Install Python doc dependencies
        run: pip install -r docs/sphinx/requirements.txt

      # ------------------------------------------------------------------
      # 4. Header-only externals (Eigen, Boost, CGAL, fmt, pybind11, ...)
      # ------------------------------------------------------------------
      - name: Cache header-only externals
        id: cache-headeronlys
        uses: actions/cache@v4
        with:
          path: |
            external/argparse
            external/boost
            external/CGAL
            external/cppcodec
            external/cpptrace
            external/doctest
            external/doxygen-awesome-css
            external/eigen
            external/exprtk
            external/fmt
            external/nanoflann
            external/nlohmann
            external/pybind11
            external/pybind11_json
          key: headeronlys-v1

      - name: Download and extract header-only externals
        if: steps.cache-headeronlys.outputs.cache-hit != 'true'
        run: |
          curl -L -o external/external_headeronlys.tar.gz "$HEADERONLYS_URL"
          cd external && tar -xzf external_headeronlys.tar.gz

      # ------------------------------------------------------------------
      # 5. cfd_externals (zlib, hdf5, cgns, parmetis)
      # ------------------------------------------------------------------
      - name: Cache cfd_externals install
        id: cache-cfd-ext
        uses: actions/cache@v4
        with:
          path: external/cfd_externals/install
          key: cfd-ext-${{ runner.os }}-${{ hashFiles('external/cfd_externals/cfd_externals_build.py', '.gitmodules') }}

      - name: Build cfd_externals
        if: steps.cache-cfd-ext.outputs.cache-hit != 'true'
        working-directory: external/cfd_externals
        run: CC=mpicc CXX=mpicxx python cfd_externals_build.py

      # ------------------------------------------------------------------
      # 6. CMake configure
      # ------------------------------------------------------------------
      - name: CMake configure
        run: CC=mpicc CXX=mpicxx cmake -B build -G Ninja -DDNDS_BUILD_TESTS=OFF

      # ------------------------------------------------------------------
      # 7. Build documentation
      # ------------------------------------------------------------------
      - name: Build Doxygen (HTML + XML)
        run: cmake --build build -t doxygen

      - name: Build Sphinx (includes embedded Doxygen)
        run: cmake --build build -t sphinx

      - name: Verify output
        run: |
          test -f build/docs/sphinx/index.html
          test -f build/docs/sphinx/doxygen/index.html
          echo "Sphinx pages: $(find build/docs/sphinx -name '*.html' | wc -l)"

      # ------------------------------------------------------------------
      # 8. Deploy
      # ------------------------------------------------------------------
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/docs/sphinx

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

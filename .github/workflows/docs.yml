# Build and deploy documentation to GitHub Pages.
# Manually triggered via workflow_dispatch.
#
# Uses the full CMake configure so that the Doxyfile, version strings,
# and all paths are handled identically to a local build.  External
# dependencies are cached to avoid rebuilding on every run.
#
# Cache layers:
#   1. pip packages        — keyed by requirements.txt + element generator
#   2. npm global packages — keyed by marp-cli cache key
#   3. Header-only libs    — keyed by tarball URL (changes ~never)
#   4. cfd_externals build — keyed by build script + submodule commit
#
# Build dependencies (beyond C++ toolchain):
#   - Doxygen + Graphviz                      (C++ API reference)
#   - Sphinx + Breathe + MyST                 (user-facing site)
#   - matplotlib + numpy                      (element topology diagrams)
#   - Node.js + @marp-team/marp-cli           (slide-deck HTML/PDF render)
#   - Node.js + @mermaid-js/mermaid-cli       (Mermaid → SVG pre-render)
#   - Google Chrome (pre-installed on runner) (Puppeteer backend for mmdc)

name: Deploy Documentation

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build docs from (branch, tag, or SHA)"
        required: false
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  HEADERONLYS_URL: https://github.com/harryzhou2000/cfd_externals_headeronlys/releases/latest/download/external_headeronlys.tar.gz

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ------------------------------------------------------------------
      # 1. Checkout (full history for git describe)
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0
          submodules: recursive

      # ------------------------------------------------------------------
      # 2. System packages
      # ------------------------------------------------------------------
      - name: Get cfd_externals submodule commit
        id: submod
        run: echo "cfd_ext_sha=$(git rev-parse HEAD:external/cfd_externals)" >> "$GITHUB_OUTPUT"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            doxygen graphviz cmake ninja-build \
            libopenmpi-dev openmpi-bin

      # ------------------------------------------------------------------
      # 3. Node.js + Marp CLI + Mermaid CLI (for slide-deck rendering)
      # ------------------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm global packages
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-marp-mermaid-${{ runner.os }}-v5

      - name: Install marp-cli and mermaid-cli
        run: |
          npm install -g @marp-team/marp-cli
          npm install -g @mermaid-js/mermaid-cli

      - name: Resolve Chrome for Puppeteer (mmdc)
        # @mermaid-js/mermaid-cli bundles puppeteer-core, which does not
        # download a browser by itself. ubuntu-latest ships Chrome at
        # /usr/bin/google-chrome; if that is absent, install it. We
        # export MERMAID_CHROME for downstream steps — build.sh reads it
        # and passes it to render_mermaid.py as --chrome <path>.
        run: |
          set -e
          resolve_chrome() {
              for cand in google-chrome google-chrome-stable chromium-browser chromium; do
                  if command -v "$cand" >/dev/null 2>&1; then
                      command -v "$cand"
                      return 0
                  fi
              done
              return 1
          }
          if ! CHROME_PATH="$(resolve_chrome)"; then
              echo "No Chrome on PATH; installing google-chrome-stable."
              wget -qO- https://dl.google.com/linux/linux_signing_key.pub \
                  | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
              echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] \
                    http://dl.google.com/linux/chrome/deb/ stable main" \
                  | sudo tee /etc/apt/sources.list.d/google-chrome.list
              sudo apt-get update
              sudo apt-get install -y --no-install-recommends google-chrome-stable
              CHROME_PATH="$(resolve_chrome)"
          fi
          echo "Chrome: $CHROME_PATH"
          "$CHROME_PATH" --version
          echo "MERMAID_CHROME=$CHROME_PATH" >> "$GITHUB_ENV"

      - name: Smoke-test mmdc
        # Fail fast (before the long docs build) if puppeteer can't launch.
        env:
          MERMAID_CHROME: ${{ env.MERMAID_CHROME }}
        run: |
          set -e
          cat > /tmp/smoke.mmd <<'EOF'
          flowchart LR
            A --> B
          EOF
          cat > /tmp/puppeteer.json <<EOF
          {"executablePath": "$MERMAID_CHROME", "args": ["--no-sandbox"]}
          EOF
          mmdc -i /tmp/smoke.mmd -o /tmp/smoke.svg -p /tmp/puppeteer.json
          test -s /tmp/smoke.svg
          echo "mmdc smoke-test OK ($(wc -c < /tmp/smoke.svg) bytes)"

      # ------------------------------------------------------------------
      # 4. Python + Sphinx dependencies
      # ------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-docs-${{ hashFiles('docs/sphinx/requirements.txt') }}
          restore-keys: pip-docs-

      - name: Install Python doc dependencies
        run: pip install -r docs/sphinx/requirements.txt

      # ------------------------------------------------------------------
      # 5. Header-only externals (Eigen, Boost, CGAL, fmt, pybind11, ...)
      # ------------------------------------------------------------------
      - name: Cache header-only externals
        id: cache-headeronlys
        uses: actions/cache@v4
        with:
          path: |
            external/argparse
            external/boost
            external/CGAL
            external/cppcodec
            external/cpptrace
            external/doctest
            external/doxygen-awesome-css
            external/eigen
            external/exprtk
            external/fmt
            external/nanoflann
            external/nlohmann
            external/pybind11
            external/pybind11_json
          key: headeronlys-v1

      - name: Download and extract header-only externals
        if: steps.cache-headeronlys.outputs.cache-hit != 'true'
        run: |
          curl -L -o external/external_headeronlys.tar.gz "$HEADERONLYS_URL"
          cd external && tar -xzf external_headeronlys.tar.gz

      # ------------------------------------------------------------------
      # 6. cfd_externals (zlib, hdf5, cgns, parmetis)
      # ------------------------------------------------------------------
      - name: Cache cfd_externals install
        id: cache-cfd-ext
        uses: actions/cache@v4
        with:
          path: external/cfd_externals/install
          key: cfd-ext-${{ runner.os }}-${{ steps.submod.outputs.cfd_ext_sha }}-${{ hashFiles('external/cfd_externals/cfd_externals_build.py') }}

      - name: Build cfd_externals
        if: steps.cache-cfd-ext.outputs.cache-hit != 'true'
        working-directory: external/cfd_externals
        run: CC=mpicc CXX=mpicxx python cfd_externals_build.py

      # ------------------------------------------------------------------
      # 7. CMake configure
      # ------------------------------------------------------------------
      - name: CMake configure
        run: CC=mpicc CXX=mpicxx cmake -B build -G Ninja -DDNDS_BUILD_TESTS=OFF

      # ------------------------------------------------------------------
      # 8. Build documentation
      # ------------------------------------------------------------------
      - name: Build element diagrams
        run: cmake --build build -t docs-elements

      - name: Build slide decks (Marp)
        run: cmake --build build -t docs-slides

      - name: Build Doxygen (HTML + XML)
        run: cmake --build build -t doxygen

      - name: Build Sphinx (includes embedded Doxygen)
        run: cmake --build build -t sphinx

      - name: Verify output
        run: |
          test -f build/docs/sphinx/index.html
          test -f build/docs/sphinx/doxygen/index.html
          test -f build/docs/sphinx/presentations/DNDSR_overview.html
          test -f build/docs/sphinx/presentations/DNDSR_overview.pdf
          test -f build/docs/html/elements/Hex27_nodes.png
          echo "Sphinx pages: $(find build/docs/sphinx -name '*.html' | wc -l)"
          echo "Element diagrams: $(find build/docs/html/elements -name '*.png' | wc -l)"

      # ------------------------------------------------------------------
      # 9. Deploy
      # ------------------------------------------------------------------
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/docs/sphinx

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
